name: Setup npm Trusted Publishers (One-time)

# npm Trusted Publishing (OIDC) を全パッケージに一括設定する一時ワークフロー。
#
# 実行後の次のステップ:
#   1. Release ワークフローが OIDC で正常 publish できることを確認
#   2. GitHub Secrets から NPM_TOKEN を削除: gh secret delete NPM_TOKEN
#   3. このワークフローファイルを削除
#
# 使い方:
#   Actions タブ → "Setup npm Trusted Publishers (One-time)" → "Run workflow"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    name: Configure Trusted Publishers for all packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Trusted Publishers (npm trust github × 47 packages)
        run: node scripts/setup-trusted-publishers.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
