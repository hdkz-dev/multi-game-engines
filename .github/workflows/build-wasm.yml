name: Build WASM Engines

# Triggered whenever the build scripts change, on a weekly schedule, or
# manually. Produces per-engine artifacts that docs.yml downloads to include
# the compiled binaries in GitHub Pages.
#
# The weekly schedule keeps artifacts within their retention window: docs.yml
# re-deploys Pages on every push and downloads the latest artifacts, so if
# they all expire the deployed site silently loses the WASM assets.

on:
  push:
    branches:
      - main
    paths:
      - "scripts/build-edax-wasm.sh"
      - "scripts/edax-worker.js"
      - "scripts/build-gnubg-wasm.sh"
      - "scripts/gnubg-worker.js"
      - "scripts/create-katago-stub-onnx.py"
      - "scripts/mortal-stub-worker.js"
      - ".github/workflows/build-wasm.yml"
  schedule:
    # Weekly refresh (Mondays 03:00 UTC) — well within the 90-day artifact
    # retention, and keeps the actions/cache entries warm (7-day eviction).
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-edax:
    name: Build Edax WASM (Emscripten)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7

      # ── Cache: compiled WASM output ─────────────────────────────────────────
      # Key includes the Emscripten version + Edax tag so any update busts
      # the cache and triggers a fresh compile.
      - name: Cache Edax WASM build
        id: cache-edax-wasm
        uses: actions/cache@v6
        with:
          path: /tmp/edax-build
          key: edax-wasm-v4.4-emcc4.0.10

      # ── Cache: Edax source clone ─────────────────────────────────────────────
      - name: Cache Edax source
        if: steps.cache-edax-wasm.outputs.cache-hit != 'true'
        uses: actions/cache@v6
        id: cache-edax-src
        with:
          path: /tmp/edax-src
          key: edax-src-v4.4

      # ── Cache: eval.dat (separate release asset, ~10MB) ──────────────────────
      - name: Cache Edax eval.dat
        if: steps.cache-edax-wasm.outputs.cache-hit != 'true'
        uses: actions/cache@v6
        with:
          path: /tmp/edax-data
          key: edax-eval-v4.4

      - name: Clone Edax source (if not cached)
        if: >
          steps.cache-edax-wasm.outputs.cache-hit != 'true' &&
          steps.cache-edax-src.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v4.4 \
            https://github.com/abulmo/edax-reversi /tmp/edax-src \
            || git clone --depth=1 \
            https://github.com/abulmo/edax-reversi /tmp/edax-src
          echo "Source cloned — repo root:"
          ls /tmp/edax-src/

      # ── Setup Emscripten ─────────────────────────────────────────────────────
      - name: Setup Emscripten SDK
        if: steps.cache-edax-wasm.outputs.cache-hit != 'true'
        uses: mymindstorm/setup-emscripten@v16
        with:
          version: "4.0.10"

      # ── Compile ──────────────────────────────────────────────────────────────
      - name: Build Edax WASM
        if: steps.cache-edax-wasm.outputs.cache-hit != 'true'
        env:
          EDAX_BUILD_OUT: /tmp/edax-build
        run: |
          bash scripts/build-edax-wasm.sh

      - name: Verify output
        run: |
          echo "Edax WASM build output:"
          ls -lh /tmp/edax-build/

      # ── Upload artifact for docs.yml ─────────────────────────────────────────
      - name: Upload Edax WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: edax-wasm-v4.4
          path: /tmp/edax-build/
          retention-days: 90
          if-no-files-found: error

  build-gnubg:
    name: Build gnubg WASM (Emscripten)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7

      # ── Cache: compiled WASM output ─────────────────────────────────────────
      - name: Cache gnubg WASM build
        id: cache-gnubg-wasm
        uses: actions/cache@v6
        with:
          path: /tmp/gnubg-build
          key: gnubg-wasm-v1.05-emcc4.0.10

      # ── Cache: gnubg-web source clone ────────────────────────────────────────
      - name: Cache gnubg source
        if: steps.cache-gnubg-wasm.outputs.cache-hit != 'true'
        uses: actions/cache@v6
        id: cache-gnubg-src
        with:
          path: /tmp/gnubg-src
          key: gnubg-src-hwatheod-v1.05

      - name: Clone gnubg-web source (if not cached)
        if: >
          steps.cache-gnubg-wasm.outputs.cache-hit != 'true' &&
          steps.cache-gnubg-src.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://github.com/hwatheod/gnubg-web /tmp/gnubg-src
          echo "Source cloned — repo root:"
          ls /tmp/gnubg-src/

      # ── Setup Emscripten ─────────────────────────────────────────────────────
      - name: Setup Emscripten SDK
        if: steps.cache-gnubg-wasm.outputs.cache-hit != 'true'
        uses: mymindstorm/setup-emscripten@v16
        with:
          version: "4.0.10"

      # ── Compile ──────────────────────────────────────────────────────────────
      - name: Build gnubg WASM
        if: steps.cache-gnubg-wasm.outputs.cache-hit != 'true'
        env:
          GNUBG_BUILD_OUT: /tmp/gnubg-build
        run: |
          bash scripts/build-gnubg-wasm.sh

      - name: Verify output
        run: |
          echo "gnubg WASM build output:"
          ls -lh /tmp/gnubg-build/

      # ── Upload artifact for docs.yml ─────────────────────────────────────────
      - name: Upload gnubg WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: gnubg-wasm-v1.05
          path: /tmp/gnubg-build/
          retention-days: 90
          if-no-files-found: error

  # ── KataGo ONNX stub model generation ───────────────────────────────────────
  #
  # Creates a valid ONNX model with KataGo's exact input/output tensor names
  # and shapes (bin_input_global_ncplane + global_input → policy).
  # Weights are deterministic random (seed=42) — NOT a real AI, but the
  # adapter pipeline can be exercised end-to-end and SRI can be computed.
  #
  # If KATAGO_ONNX_URL secret is set, download a real model instead of
  # using the stub.
  build-katago:
    name: Build KataGo ONNX Model
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # ── Cache: generated ONNX output ────────────────────────────────────────
      - name: Cache KataGo ONNX output
        id: cache-katago-onnx
        uses: actions/cache@v6
        with:
          path: /tmp/katago-onnx
          key: katago-onnx-stub-v1-${{ hashFiles('scripts/create-katago-stub-onnx.py') }}

      # ── Real model: download from KATAGO_ONNX_URL if set ────────────────────
      - name: Download real KataGo ONNX model (if KATAGO_ONNX_URL is set)
        if: steps.cache-katago-onnx.outputs.cache-hit != 'true'
        env:
          KATAGO_ONNX_URL: ${{ secrets.KATAGO_ONNX_URL }}
        run: |
          mkdir -p /tmp/katago-onnx
          if [[ -n "${KATAGO_ONNX_URL:-}" ]]; then
            echo "📥  Downloading real KataGo ONNX model from secret URL..."
            curl -fsSL --retry 3 --retry-delay 5 \
              -o /tmp/katago-onnx/katago-b6c96.onnx \
              "${KATAGO_ONNX_URL}"
            echo "✅  Real model downloaded: $(du -sh /tmp/katago-onnx/katago-b6c96.onnx | cut -f1)"
            echo "USED_REAL_MODEL=true" >> "$GITHUB_ENV"
          else
            echo "ℹ️  KATAGO_ONNX_URL not set — will generate stub model."
            echo "USED_REAL_MODEL=false" >> "$GITHUB_ENV"
          fi

      # ── Stub model: generate with Python when no real model ─────────────────
      - name: Install Python ONNX dependencies
        if: >
          steps.cache-katago-onnx.outputs.cache-hit != 'true' &&
          env.USED_REAL_MODEL != 'true'
        run: pip install --quiet onnx numpy

      - name: Generate KataGo ONNX stub model
        if: >
          steps.cache-katago-onnx.outputs.cache-hit != 'true' &&
          env.USED_REAL_MODEL != 'true'
        run: |
          mkdir -p /tmp/katago-onnx
          python3 scripts/create-katago-stub-onnx.py /tmp/katago-onnx/katago-b6c96.onnx

      # ── SRI hash computation ─────────────────────────────────────────────────
      - name: Compute SHA-384 SRI hash
        run: |
          MODEL=/tmp/katago-onnx/katago-b6c96.onnx
          if [[ ! -f "$MODEL" ]]; then
            echo "❌  No ONNX model found at $MODEL"
            exit 1
          fi
          SRI_HASH="sha384-$(openssl dgst -sha384 -binary "$MODEL" | base64 | tr -d '\n')"
          echo "🔐  SRI: ${SRI_HASH}"
          mkdir -p packages/registry/data/sri-hashes
          echo "${SRI_HASH}" > packages/registry/data/sri-hashes/katago-1.14.txt
          echo "✅  Written to packages/registry/data/sri-hashes/katago-1.14.txt"

      - name: Verify output
        run: |
          echo "KataGo ONNX output:"
          ls -lh /tmp/katago-onnx/

      # ── Upload artifact for docs.yml ─────────────────────────────────────────
      - name: Upload KataGo ONNX artifact
        uses: actions/upload-artifact@v7
        with:
          name: katago-onnx-v1.14
          path: /tmp/katago-onnx/
          retention-days: 90
          if-no-files-found: error

  # ── Mortal stub Worker packaging ─────────────────────────────────────────────
  #
  # Mortal (PyTorch-based mahjong AI) cannot be compiled to WASM directly.
  # This job packages a rule-based stub Worker that speaks the MahjongJSON
  # protocol so the adapter pipeline can be exercised end-to-end.
  # Replace with a real ONNX Runtime Web-based worker once a converted model
  # is available.
  build-mortal:
    name: Package Mortal Stub Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Package Mortal stub worker
        run: |
          mkdir -p /tmp/mortal-build
          cp scripts/mortal-stub-worker.js /tmp/mortal-build/mortal.js
          echo "Mortal stub worker:"
          ls -lh /tmp/mortal-build/

      - name: Compute SHA-384 SRI hash
        run: |
          SRI_HASH="sha384-$(openssl dgst -sha384 -binary /tmp/mortal-build/mortal.js | base64 | tr -d '\n')"
          echo "🔐  SRI: ${SRI_HASH}"
          mkdir -p packages/registry/data/sri-hashes
          echo "${SRI_HASH}" > packages/registry/data/sri-hashes/mortal-1.0.txt
          echo "✅  Written to packages/registry/data/sri-hashes/mortal-1.0.txt"

      - name: Upload Mortal stub artifact
        uses: actions/upload-artifact@v7
        with:
          name: mortal-stub-v1.0
          path: /tmp/mortal-build/
          retention-days: 90
          if-no-files-found: error
