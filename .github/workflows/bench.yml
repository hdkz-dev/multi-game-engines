name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  bench:
    name: Core Hot-Path Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @multi-game-engines/core build

      - name: Run benchmarks
        id: bench
        working-directory: packages/core
        run: |
          pnpm bench 2>&1 | tee bench-output.txt
          echo "bench_output<<EOF" >> "$GITHUB_OUTPUT"
          cat bench-output.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: packages/core/bench-results.json
          retention-days: 90

      - name: Comment benchmark summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const outputPath = "packages/core/bench-output.txt";
            let body = "## Benchmark Results — `@multi-game-engines/core`\n\n";
            if (fs.existsSync(outputPath)) {
              const raw = fs.readFileSync(outputPath, "utf8");
              // Extract the summary table lines (lines with hz/min/max/mean)
              const lines = raw.split("\n");
              const tableLines = lines.filter(
                (l) =>
                  l.includes("hz") ||
                  l.includes("·") ||
                  l.includes("✓") ||
                  l.includes("BENCH") ||
                  l.includes("faster"),
              );
              body += "```\n" + tableLines.join("\n") + "\n```\n";
            } else {
              body += "_No benchmark output found._\n";
            }
            body += "\n> Benchmarks run on `ubuntu-latest` with Node.js 24.";

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) =>
                c.user.login === "github-actions[bot]" &&
                c.body.startsWith("## Benchmark Results"),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
