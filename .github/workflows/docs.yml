name: Deploy API Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # Re-deploy Pages whenever the Emscripten build produces new WASM binaries.
  workflow_run:
    workflows: ["Build WASM Engines"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build TypeDoc + WASM Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (required for TypeDoc type resolution)
        run: pnpm build

      - name: Generate TypeDoc
        # `pnpm docs` conflicts with npm's built-in `docs` command (opens browser).
        # Use npx typedoc directly to avoid the ambiguity.
        run: npx typedoc

      # ── WASM Assets (ADR-014: GPL binaries not committed to source) ──────
      - name: Cache WASM download archives
        uses: actions/cache@v5
        id: cache-wasm
        with:
          path: /tmp/wasm-archives
          key: wasm-yaneuraou-v7.5.0-alpha.4

      - name: Download WASM archives (if not cached)
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/wasm-archives
          echo "Downloading YaneuraOu.wasm v7.5.0-alpha.4 (GPL-3.0)..."
          curl -fsSL \
            "https://github.com/mizar/YaneuraOu.wasm/releases/download/v7.5.0-alpha.4/YaneuraOu.wasm-v7.5.0-alpha.4-wasm.zip" \
            -o /tmp/wasm-archives/yaneuraou-v7.5.0-alpha.4-wasm.zip
          echo "Download complete."

      - name: Extract WASM assets
        run: |
          # やねうら王 7.5 — material variant (self-contained piece-count eval)
          DEST=assets-staging/assets/yaneuraou/7.5
          mkdir -p "$DEST"
          unzip -p /tmp/wasm-archives/yaneuraou-v7.5.0-alpha.4-wasm.zip \
            "wasm/material/lib/yaneuraou.material.js"   > "$DEST/yaneuraou.js"
          unzip -p /tmp/wasm-archives/yaneuraou-v7.5.0-alpha.4-wasm.zip \
            "wasm/material/lib/yaneuraou.material.wasm" > "$DEST/yaneuraou.wasm"

          # License notice (GPL-3.0 — ADR-014)
          cat > assets-staging/assets/yaneuraou/LICENSE <<'EOF'
          Source: mizar/YaneuraOu.wasm v7.5.0-alpha.4 (material variant)
          Origin: yaneurao/YaneuraOu (the World's Strongest Shogi engine)
          License: GPL-3.0-or-later
          https://github.com/yaneurao/YaneuraOu/blob/master/LICENSE

          This directory contains a pre-compiled WebAssembly build of YaneuraOu.
          Redistribution and use are subject to the GNU General Public License v3.
          The multi-game-engines core library (MIT) does NOT include these binaries.
          EOF

          echo "WASM assets extracted:"
          find assets-staging/assets -type f | sort

      # ── Edax WASM (Phase B2: Emscripten build from build-wasm.yml) ─────────
      # Download the artifact produced by the "Build WASM Engines" workflow.
      # If no successful run exists yet (e.g. first deploy), this step is
      # skipped gracefully and the Edax placeholder URL remains inactive.
      - name: Download Edax WASM artifact (if available)
        id: dl-edax
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v9
        with:
          name: edax-wasm-v4.4
          workflow: build-wasm.yml
          branch: main
          if_no_artifact_found: warn
          path: /tmp/edax-wasm

      - name: Stage Edax WASM assets
        if: steps.dl-edax.outcome == 'success'
        run: |
          DEST=assets-staging/assets/edax/4.4
          mkdir -p "$DEST"
          # edax.js        — Worker entry point (wraps Emscripten module)
          # edax.module.js — Emscripten glue JS (loaded by edax.js via importScripts)
          # edax.wasm      — WASM binary (Emscripten loads automatically)
          # edax.module.data — Preloaded eval.dat (~14MB, Emscripten FS)
          cp /tmp/edax-wasm/edax.js             "$DEST/edax.js"
          cp /tmp/edax-wasm/edax.module.js      "$DEST/edax.module.js"
          cp /tmp/edax-wasm/edax.module.wasm    "$DEST/edax.wasm"
          cp /tmp/edax-wasm/edax.module.data    "$DEST/edax.module.data"

          # License notice (GPL-2.0-or-later — ADR-014)
          cat > assets-staging/assets/edax/LICENSE <<'EOF'
          Source: abulmo/edax-reversi v4.4.0 (Emscripten/ASYNCIFY build)
          Origin: https://github.com/abulmo/edax-reversi
          License: GPL-2.0-or-later
          https://github.com/abulmo/edax-reversi/blob/master/COPYING

          This directory contains a WebAssembly build of Edax (Othello/Reversi engine).
          Redistribution and use are subject to the GNU General Public License v2.
          The multi-game-engines core library (MIT) does NOT include these binaries.
          EOF

          echo "Edax WASM assets staged:"
          find assets-staging/assets/edax -type f | sort

      # ── gnubg WASM (Phase B2: Emscripten build from build-wasm.yml) ────────
      - name: Download gnubg WASM artifact (if available)
        id: dl-gnubg
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v9
        with:
          name: gnubg-wasm-v1.05
          workflow: build-wasm.yml
          branch: main
          if_no_artifact_found: warn
          path: /tmp/gnubg-wasm

      - name: Stage gnubg WASM assets
        if: steps.dl-gnubg.outcome == 'success'
        run: |
          DEST=assets-staging/assets/gnubg/1.05
          mkdir -p "$DEST"
          # gnubg.js        — Worker entry point (wraps Emscripten module)
          # gnubg.module.js — Emscripten glue JS (loaded by gnubg.js via importScripts)
          # gnubg.wasm      — WASM binary (Emscripten loads automatically)
          # gnubg.module.data — Preloaded data bundle (neural nets + bearoff DBs, ~2MB)
          cp /tmp/gnubg-wasm/gnubg.js          "$DEST/gnubg.js"
          cp /tmp/gnubg-wasm/gnubg.module.js   "$DEST/gnubg.module.js"
          cp /tmp/gnubg-wasm/gnubg.module.wasm "$DEST/gnubg.wasm"
          cp /tmp/gnubg-wasm/gnubg.module.data "$DEST/gnubg.module.data"

          # License notice (GPL-3.0 — ADR-014)
          cat > assets-staging/assets/gnubg/LICENSE <<'EOF'
          Source: hwatheod/gnubg-web (gnubg v1.05.000, Emscripten build)
          Origin: https://github.com/hwatheod/gnubg-web
          Upstream: https://www.gnu.org/software/gnubg/
          License: GPL-3.0-or-later
          https://www.gnu.org/software/gnubg/

          This directory contains a WebAssembly build of GNU Backgammon.
          Redistribution and use are subject to the GNU General Public License v3.
          The multi-game-engines core library (MIT) does NOT include these binaries.
          EOF

          echo "gnubg WASM assets staged:"
          find assets-staging/assets/gnubg -type f | sort

      # ── Combine TypeDoc + Assets → single Pages artifact ────────────────
      - name: Assemble GitHub Pages output
        run: |
          mkdir -p gh-pages-output
          # TypeDoc at root
          cp -r docs/api/. gh-pages-output/
          # WASM assets under /assets/
          cp -r assets-staging/assets gh-pages-output/
          echo "GitHub Pages output:"
          find gh-pages-output/assets -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: gh-pages-output

  deploy-docs:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
