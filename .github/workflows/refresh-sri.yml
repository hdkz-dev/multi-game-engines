name: Refresh Engine SRI Hashes

on:
  push:
    paths:
      - "packages/registry/data/engines.json"
      - "scripts/refresh-engine-sris.mjs"
  schedule:
    - cron: "0 0 * * 0" # 毎週日曜日に定期チェック
  workflow_dispatch: # 手動実行も許可
  # Auto-refresh after WASM assets are deployed to GitHub Pages.
  # When docs.yml publishes new binaries, SRI hashes may be stale.
  workflow_run:
    workflows: ["Deploy API Docs"]
    types: [completed]
    branches: [main]

jobs:
  refresh-sri:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run SRI Refresh Script
        run: node scripts/refresh-engine-sris.mjs
        env:
          # 既存 SRI を持つアセットの取得失敗 (404 等) をエラーにして
          # ワークフローを失敗させる (本番アセット消失の検知)
          SRI_STRICT: "1"

      - name: Open issue on asset fetch failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TITLE="SRI refresh failed: production asset fetch error"
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "in:title \"$TITLE\"" --json number --jq '.[0].number')
          BODY="The scheduled SRI refresh failed — one or more assets with an existing SRI could not be fetched (possible 404 on GitHub Pages). See run: $RUN_URL"
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" --body "$BODY"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" \
              --body "$BODY" --label "registry,security"
          fi

      # 一部アセットが 404 でも、他アセットの正当な SRI 更新は PR にする。
      # 条件なしだと前ステップ失敗時にスキップされ、更新分が失われるため。
      # ジョブ自体は失敗のままなので 404 の通知は従来どおり行われる。
      - name: Create Pull Request if updated
        if: ${{ !cancelled() }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(registry): refresh engine SRI hashes"
          branch: chore/refresh-sri
          title: "chore(registry): refresh engine SRI hashes"
          body: |
            This is an automated PR to update SRI hashes in `engines.json`.
            The hashes were recalculated based on current remote assets.
          labels: |
            registry
            security
            automated-pr
