name: CI

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo build

      - name: Lint
        run: pnpm exec turbo lint

      - name: Typecheck
        run: pnpm exec turbo typecheck

      - name: Test
        run: pnpm exec turbo test

      - name: Coverage threshold (core)
        # 2026-05-11: Enforces packages/core line coverage ≥98.4% (the original
        # Coverage Restoration target). Prevents regression of the gains from
        # PR #140-#155 + dispose-race/Range/SRI/IDB-fallback closures.
        # Threshold values live in packages/core/vitest.config.ts.
        run: pnpm --filter @multi-game-engines/core test:coverage

      - name: Doc Sync Check
        run: pnpm run doc-sync

      - name: Audit
        uses: google/osv-scanner-action@v2.3.8
